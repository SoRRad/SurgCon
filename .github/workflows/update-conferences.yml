name: Update Conferences

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * 1"

permissions:
  contents: write

jobs:
  update-conferences:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Run review pipeline
        run: |
          python scripts/discover_conferences.py
          python scripts/normalize_conferences.py
          python scripts/merge_conferences.py
          python scripts/validate_conferences.py

      - name: Publish normalized frontend data
        run: node scripts/generate-conferences.js

      - name: Build app
        run: npm run build

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data src README.md .github/workflows/update-conferences.yml package.json
          git diff --cached --quiet || git commit -m "chore: refresh conference data"
          git push
